        font-family: 'Kalam', cursive;

      @keyframes pageTurn {
        0% { transform: perspective(1000px) rotateY(0deg); transform-origin: left; opacity: 1; }
        100% { transform: perspective(1000px) rotateY(-90deg); transform-origin: left; opacity: 0; }
      }
      .animate-page-turn {
        animation: pageTurn 0.6s ease-in-out forwards;
      }
